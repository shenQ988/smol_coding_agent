# Agent configuration
agent:
  provider: anthropic  # anthropic, openai, or ollama
  model: claude-sonnet-4-6    # model name
  max_iterations: 15           # safety limit for ReAct loop
  temperature: 0

# MCP servers 
mcp_servers:
  github:
    command: docker
    args: ["run", "-i", "--rm", "-e", "GITHUB_PERSONAL_ACCESS_TOKEN", "ghcr.io/github/github-mcp-server"]
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_TOKEN}

# Skills directory
skills_dir: ./skills

# Approval policy: "ask", "auto", or "deny"
approval_policy: ask